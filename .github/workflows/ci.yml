name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend ──────────────────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements.txt ruff pytest pytest-asyncio

      - name: Lint (Ruff)
        run: ruff check .

      - name: Format check (Ruff)
        run: ruff format --check .

      - name: Tests
        run: pytest
        env:
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test
          GOOGLE_REDIRECT_URI: http://localhost:8000/auth/callback
          ANTHROPIC_API_KEY: test
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY }}
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          APP_ENV: development
          APP_SECRET_KEY: testkey32charslongenoughfortest1
          FRONTEND_URL: http://localhost:3000
          BACKEND_URL: http://localhost:8000

      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --severity medium

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Lint + Format (Biome)
        run: bun run ci

      - name: Type check
        run: bunx tsc --noEmit

      - name: Tests
        run: bun run test

      - name: Build
        run: bun run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Security audit
        run: bun audit --level moderate

  # ─── Secrets scan ─────────────────────────────────────────────────────────
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # histórico completo para detectar secrets antigos

      - name: TruffleHog — detecta secrets commitados
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
